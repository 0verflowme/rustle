name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-14
          - windows-latest
          - windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify release matrix
        if: matrix.os == 'ubuntu-latest'
        run: python3 scripts/verify-release-matrix.py

      - name: Generate code health report
        if: matrix.os == 'ubuntu-latest'
        run: python3 scripts/code-health.py --top 25

      - name: Upload code health report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: code-health-report
          path: target/code-health

      - name: Verify Windows TUN smoke assertions
        if: matrix.os == 'ubuntu-latest'
        run: python3 scripts/verify-windows-tun-smoke.py

      - name: Verify live benchmark row gates
        if: matrix.os == 'ubuntu-latest'
        run: python3 scripts/verify-live-benchmark-rows.py --self-test

      - name: Verify live evidence artifact gates
        if: matrix.os == 'ubuntu-latest'
        run: python3 scripts/verify-live-evidence.py --self-test

      - name: Install Linux smoke dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl openssh-client openssh-server iproute2 python3

      - name: Check formatting
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --locked

      - name: Rootless agent sidecar preparation smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-agent-sidecars.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "agent sidecar smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Windows smoke script syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errors = $null
          $tokens = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path "scripts/smoke-windows-tun.ps1"), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List *
            exit 1
          }

      - name: Rootless bridge smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-bridge-lab.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "bridge smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Rootless SSH config alias smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-ssh-config-alias-lab.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "SSH config alias smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Rootless agent TCP smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-agent-lab.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "agent TCP smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Rootless agent UDP smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-agent-udp-lab.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "agent UDP smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Rootless agent bridge smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-agent-bridge-lab.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "agent bridge smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Rootless QUIC agent bridge smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-quic-agent-lab.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "QUIC agent bridge smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Rootless agent reconnect smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-agent-reconnect-lab.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "agent reconnect smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Rootless agent reconnect benchmark
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          RUSTLE_BENCH_PROFILE: debug
          RUSTLE_BENCH_RUNS: 3
          RUSTLE_BENCH_WARMUP_RUNS: 0
          RUSTLE_BENCH_AGENT_RECONNECT_MAX_ELAPSED_MS: 6000
          RUSTLE_BENCH_AGENT_RECONNECT_MAX_P50_US: 2000000
        run: |
          set -euo pipefail
          status=0
          bash scripts/bench-agent-reconnect-lab.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "agent reconnect benchmark skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Build release benchmark binary
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --locked --release

      - name: Rootless tiny-response release benchmark
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          RUSTLE_BENCH_RUNS: 3
          RUSTLE_BENCH_WARMUP_RUNS: 0
          RUSTLE_BENCH_BODY_BYTES: 1024
          RUSTLE_BENCH_CONNECTIONS: 1
          RUSTLE_BENCH_BRIDGE_TRANSPORTS: agent quic-native
          RUSTLE_BENCH_MAX_ELAPSED_MS: 2000
          RUSTLE_BENCH_MAX_P50_US: 25000
        run: bash scripts/bench-bridge-lab.sh

      - name: Rootless 100 MiB agent/native release benchmark
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          RUSTLE_BENCH_RUNS: 3
          RUSTLE_BENCH_WARMUP_RUNS: 0
          RUSTLE_BENCH_BODY_BYTES: 104857600
          RUSTLE_BENCH_CONNECTIONS: 1
          RUSTLE_BENCH_BRIDGE_TRANSPORTS: agent quic-native
          RUSTLE_BENCH_MIN_THROUGHPUT_MIB_S: 5
        run: bash scripts/bench-bridge-lab.sh

      - name: Rootless 100 MiB QUIC agent release benchmark
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          RUSTLE_BENCH_RUNS: 1
          RUSTLE_BENCH_WARMUP_RUNS: 0
          RUSTLE_BENCH_BODY_BYTES: 104857600
          RUSTLE_BENCH_CONNECTIONS: 1
          RUSTLE_BENCH_BRIDGE_TRANSPORTS: quic-agent
          RUSTLE_BENCH_MIN_THROUGHPUT_MIB_S: 5
        run: bash scripts/bench-bridge-lab.sh

      - name: Rootless chunked-response agent release benchmark
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          RUSTLE_BENCH_RUNS: 1
          RUSTLE_BENCH_WARMUP_RUNS: 0
          RUSTLE_BENCH_BODY_BYTES: 8388608
          RUSTLE_BENCH_CONNECTIONS: 1
          RUSTLE_BENCH_BRIDGE_TRANSPORTS: agent
          RUSTLE_BENCH_HTTP_CHUNK_BYTES: 262144
          RUSTLE_BENCH_HTTP_CHUNK_DELAY_MS: 5
          RUSTLE_BENCH_MIN_THROUGHPUT_MIB_S: 20
          RUSTLE_BENCH_MAX_ELAPSED_MS: 1000
        run: bash scripts/bench-bridge-lab.sh

      - name: Rootless DNS latency release benchmark
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          RUSTLE_BENCH_RUNS: 1
          RUSTLE_BENCH_WARMUP_RUNS: 0
          RUSTLE_BENCH_AGENT_DNS_QUERIES: 4
          RUSTLE_BENCH_AGENT_DNS_MAX_P50_US: 500000
        run: bash scripts/bench-agent-dns-lab.sh

      - name: Rootless QUIC DNS latency release benchmark
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          RUSTLE_BENCH_RUNS: 1
          RUSTLE_BENCH_WARMUP_RUNS: 0
          RUSTLE_BENCH_AGENT_DNS_QUERIES: 4
          RUSTLE_BENCH_AGENT_DNS_TRANSPORTS: quic-agent
          RUSTLE_BENCH_AGENT_DNS_MAX_P50_US: 500000
        run: bash scripts/bench-agent-dns-lab.sh

      - name: Rootless agent active-failure smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-agent-active-failure-lab.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "agent active-failure smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Rootless high-fanout bridge stress
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/stress-bridge-lab.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "bridge stress skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Linux TUN DNS smoke over direct-tcpip
        if: runner.os == 'Linux'
        shell: bash
        env:
          RUSTLE_SMOKE_BRIDGE_TRANSPORT: direct-tcpip
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-tun-dns.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "TUN DNS smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Linux TUN DNS smoke over agent
        if: runner.os == 'Linux'
        shell: bash
        env:
          RUSTLE_SMOKE_BRIDGE_TRANSPORT: agent
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-tun-dns.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "agent TUN DNS smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: macOS TUN DNS smoke over direct-tcpip
        if: runner.os == 'macOS'
        shell: bash
        env:
          RUSTLE_SMOKE_BRIDGE_TRANSPORT: direct-tcpip
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-tun-dns.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "macOS TUN DNS smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: macOS TUN DNS smoke over agent
        if: runner.os == 'macOS'
        shell: bash
        env:
          RUSTLE_SMOKE_BRIDGE_TRANSPORT: agent
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-tun-dns.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "agent macOS TUN DNS smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Linux netns TCP smoke
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-linux-netns-tcp.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "netns TCP smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Linux netns TCP smoke over agent
        if: runner.os == 'Linux'
        shell: bash
        env:
          RUSTLE_NETNS_BRIDGE_TRANSPORT: agent
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-linux-netns-tcp.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "agent netns TCP smoke skipped on this runner"
            exit 0
          fi
          exit "$status"

      - name: Linux netns UDP smoke over agent
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          status=0
          bash scripts/smoke-linux-netns-udp.sh || status=$?
          if [[ "$status" -eq 77 ]]; then
            echo "agent netns UDP smoke skipped on this runner"
            exit 0
          fi
          exit "$status"
